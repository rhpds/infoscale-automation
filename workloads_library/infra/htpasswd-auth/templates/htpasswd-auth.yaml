apiVersion: v1
kind: ServiceAccount
metadata:
  name: htpasswd-auth-setup
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: htpasswd-auth-setup
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: htpasswd-auth-setup
  namespace: openshift-config
---
apiVersion: batch/v1
kind: Job
metadata:
  name: htpasswd-auth-setup
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: htpasswd-auth-setup
      restartPolicy: Never
      containers:
      - name: setup
        image: bitnami/kubectl
        env:
        - name: ADMIN_PASSWORD
          value: {{ .Values.adminPassword | quote }}
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          HTPASSWD_FILE=$(mktemp)
          SECRET_NAME="htpasswd-secret"

          # Install httpd-tools for htpasswd (already in bitnami/kubectl? use python fallback)
          HASH=$(python3 -c "
          import hashlib, base64, os
          salt = os.urandom(16)
          h = hashlib.sha1(('${ADMIN_PASSWORD}').encode() + salt).digest()
          print('{SSHA}' + base64.b64encode(h + salt).decode())
          " 2>/dev/null || true)

          if [ -z "$HASH" ]; then
            # fallback: use openssl
            HASH=$(openssl passwd -apr1 "${ADMIN_PASSWORD}")
            echo "admin:${HASH}" > "$HTPASSWD_FILE"
          else
            echo "admin:${HASH}" > "$HTPASSWD_FILE"
          fi

          if kubectl get secret "$SECRET_NAME" -n openshift-config &>/dev/null; then
            echo "Secret $SECRET_NAME already exists, updating..."
            kubectl create secret generic "$SECRET_NAME" \
              --from-file=htpasswd="$HTPASSWD_FILE" \
              -n openshift-config \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "Creating secret $SECRET_NAME..."
            kubectl create secret generic "$SECRET_NAME" \
              --from-file=htpasswd="$HTPASSWD_FILE" \
              -n openshift-config
          fi

          rm -f "$HTPASSWD_FILE"

          echo "Patching OAuth cluster resource..."
          kubectl apply -f - <<'OAUTH'
          apiVersion: config.openshift.io/v1
          kind: OAuth
          metadata:
            name: cluster
          spec:
            identityProviders:
            - name: htpasswd
              mappingMethod: claim
              type: HTPasswd
              htpasswd:
                fileData:
                  name: htpasswd-secret
          OAUTH

          echo "Creating cluster-admin ClusterRoleBinding for admin user..."
          kubectl apply -f - <<'CRB'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: htpasswd-admin-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: User
            name: admin
          CRB

          echo "Done. htpasswd auth configured with admin user."