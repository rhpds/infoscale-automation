apiVersion: v1
kind: ServiceAccount
metadata:
  name: lvms-default-storageclass
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lvms-default-storageclass
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: lvms-default-storageclass
  namespace: openshift-storage
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lvms-default-storageclass
  namespace: openshift-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: lvms-default-storageclass
      restartPolicy: Never
      containers:
      - name: set-default-sc
        image: bitnami/kubectl
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          SC_NAME="lvms-vg1"

          echo "Waiting for StorageClass '$SC_NAME' to exist..."
          for i in $(seq 1 60); do
            if kubectl get storageclass "$SC_NAME" &>/dev/null; then
              break
            fi
            echo "  attempt $i/60 — not found yet, waiting 10s..."
            sleep 10
          done

          if ! kubectl get storageclass "$SC_NAME" &>/dev/null; then
            echo "ERROR: StorageClass '$SC_NAME' did not appear after 10 minutes."
            exit 1
          fi

          echo "Removing default annotation from any existing default StorageClass..."
          DEFAULTS=$(kubectl get storageclass \
            -o jsonpath='{range .items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")]}{.metadata.name}{"\n"}{end}')

          for SC in $DEFAULTS; do
            if [ "$SC" != "$SC_NAME" ]; then
              echo "  unsetting default on '$SC'"
              kubectl patch storageclass "$SC" \
                -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
            fi
          done

          echo "Setting '$SC_NAME' as the default StorageClass..."
          kubectl patch storageclass "$SC_NAME" \
            -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

          echo "Done. '$SC_NAME' is now the default StorageClass."
