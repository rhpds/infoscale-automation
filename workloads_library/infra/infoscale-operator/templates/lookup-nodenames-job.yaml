---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-lookup-job
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-lookup-job
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: node-lookup-job
  namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: node-lookup-job
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: node-lookup-job
      containers:
      - name: node-lookup-job
        image: bitnami/kubectl:latest
        #image: image-registry.openshift-image-registry.svc:5000/openshift/cli
        command:
        - /bin/sh
        - -c
        - |
        # 1. Get node names and format into JSON array of objects
        # Example Output: [{"name":"node-a"},{"name":"node-b"}]
        NODE_JSON=$(kubectl get nodes -o json | jq -c '[.items[].metadata.name | {name: .}]')

        # 2. Create/Update the ConfigMap with the required label and 'iterations' key
        kubectl create configmap node-list-config \
          --from-literal=iterations="$NODE_JSON" \
          --dry-run=client -o yaml > cm.yaml

        # Add the label so the ApplicationSet selector can find it
        sed -i '/metadata:/a \  labels:\n    nodes-found: "true"' cm.yaml

        kubectl apply -f cm.yaml -n openshift-gitops
