apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: example2-helm-basic
  namespace: {{ .Values.example2HelmBasic.namespace }}
  labels:
    app: example2-helm-basic
    tenant: {{ .Values.tenant.name }}
spec:
  host: example2-helm-basic-{{ .Values.tenant.name }}.{{ .Values.deployer.domain }}
  to:
    kind: Service
    name: example2-helm-basic
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
