{{ if .Values.example1InlineResource.enabled -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: example1-inline-resource
  namespace: {{ .Values.example1InlineResource.namespace }}
  labels:
    app: example1-inline-resource
    tenant: {{ .Values.tenant.name }}
spec:
  host: example1-inline-resource-{{ .Values.tenant.name }}.{{ .Values.deployer.domain }}
  to:
    kind: Service
    name: example1-inline-resource
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
