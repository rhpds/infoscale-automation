{{ if .Values.example2HelmBasic.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example2-helm-basic-{{ .Values.tenant.name }}
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ .Values.example2HelmBasic.git.repoURL }}
    targetRevision: {{ .Values.example2HelmBasic.git.targetRevision }}
    path: {{ .Values.example2HelmBasic.git.path }}
    helm:
      values: |
        deployer:
        {{- .Values.deployer | toYaml | nindent 12 }}
        tenant:
        {{- .Values.tenant | toYaml | nindent 12 }}
        example2HelmBasic:
        {{- .Values.example2HelmBasic | toYaml | nindent 12 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.example2HelmBasic.namespace }}
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
