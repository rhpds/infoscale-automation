# cluster/platform/bootstrap/values.yaml
#
# This is the platform layer Helm chart. It is NOT deployed directly by the Ansible role.
# Instead, the infra bootstrap (cluster/infra/bootstrap/) spawns it by creating
# the "bootstrap-platform" ArgoCD Application.
#
# What this chart does:
#   Creates child ArgoCD Applications for each enabled platform workload.
#   Platform workloads configure operators (CRs, patches) and deploy cluster-wide
#   shared services. Operators must be installed first via the infra layer.
#
# HOW VALUES REACH THIS CHART:
#   The infra bootstrap forwards two things to this chart:
#     1. deployer.*  — domain, apiUrl, guid (from the live cluster)
#     2. Everything under platformValues: in infra/bootstrap/values.yaml
#
#   So in the catalog, you control this chart via:
#     ocp4_workload_gitops_bootstrap_helm_values:
#       platformValues:          # <-- these become top-level values here
#         kubevirt:
#           enabled: true
#
#   You never call ocp4_workload_gitops_bootstrap twice to reach this chart.

# ---------------------------------------------------------------------------
# Git defaults — applied to every workload via YAML anchors (&git_defaults).
# ---------------------------------------------------------------------------
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/infoscale-automation.git
  targetRevision: main

secondary_cluster: &secondary dr

# ---------------------------------------------------------------------------
# deployer — forwarded here verbatim from the infra bootstrap.
# Used by templates that need the cluster domain (e.g., provision data ConfigMaps,
# Route hostnames). The placeholder below is overwritten at runtime.
# ---------------------------------------------------------------------------
deployer:
  domain: cluster.example.com

infoscale:
  enabled: true
  destinations:
    - in-cluster
    - *secondary
  git:
    path: workloads_library/platform/infoscale
    <<: *git_defaults

# ===========================================================================
# WORKLOADS LIBRARY
# Pre-built, tested Helm charts for common platform configurations.
# All disabled by default. Enable via platformValues in the catalog.
# These configure operators — the corresponding infra-layer operator must be
# installed first. See workloads_library/platform/<name>/ for details.
#
# IMPORTANT: workloads that span both layers (e.g. kubevirt, descheduler)
# require enabling BOTH the infra operator AND this platform workload.
# ===========================================================================

# KubeVirt (OpenShift Virtualization) — creates HyperConverged CR and StorageClass.
# Infra pair: kubevirtOperator (in infra values)
kubevirt:
  enabled: true
  git:
    path: workloads_library/platform/kubevirt
    <<: *git_defaults

# Web Terminal — deploys the Web Terminal operator and creates the WebTerminal CR.
# No infra-layer pair; the operator installs via this chart directly.
webterminal:
  enabled: true
  git:
    path: workloads_library/platform/webterminal
    <<: *git_defaults
