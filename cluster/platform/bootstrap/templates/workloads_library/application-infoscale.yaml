{{ if .Values.infoscale.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infoscale
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ .Values.infoscale.git.repoURL }}
    targetRevision: {{ .Values.infoscale.git.targetRevision }}
    path: {{ .Values.infoscale.git.path }}
    helm:
      values: |
        allNodeNames:
        {{- if .Values.allNodeNames }}
        {{- .Values.allNodeNames | toYaml | nindent 10 }}
        {{- end }}
        deployer:
        {{- .Values.deployer | toYaml | nindent 10 }}
        {{- if .Values.platformValues }}
        {{- .Values.platformValues | toYaml | nindent 8 }}
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
