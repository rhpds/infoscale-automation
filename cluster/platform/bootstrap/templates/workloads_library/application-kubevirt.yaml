{{ if .Values.kubevirt.enabled -}}
{{- range $dest := .Values.kubevirt.destinations }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt{{- if ne $dest "in-cluster" }}-{{ $dest }}{{- end }}
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ $.Values.kubevirt.git.repoURL }}
    targetRevision: {{ $.Values.kubevirt.git.targetRevision }}
    path: {{ $.Values.kubevirt.git.path }}
    helm:
      values: |
        allNodeNames: {{ $.Values.allNodeNames | quote }}
        nonce: nonce
  destination:
    name: {{ $dest }}
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "hco.kubevirt.io"
    kind: "HyperConverged"
    jsonPointers:
    - /spec/enableCommonBootImageImport
{{- end }}
{{- end }}
