{{ if .Values.infoscale.enabled -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infoscale
  namespace: openshift-gitops
spec:
  generators:
    - clusterDecisionResource:
        apiVersion: v1
        kind: ConfigMap
        # Explicitly point to the CM created by your Job
        configMapRef: node-list-config
        labelSelector:
          matchLabels:
            nodes-found: "true"
        template:
          metadata:
            name: {{ `{{name}}` | quote }}
          spec:
            # We add a dummy value here to satisfy the 'Required' spec field
            nodeName: {{ `{{name}}` | quote }}
        requeueAfterSeconds: 60
  template:
    metadata:
      # This metadata is for the Applications being created
      name: {{ `app-{{name}}` | quote }}
    spec:
      project: default
      source:
        repoURL: {{ .Values.infoscale.git.repoURL }}
        targetRevision: {{ .Values.infoscale.git.targetRevision }}
        path: {{ .Values.infoscale.git.path }}
        helm:
          parameters:
            # Pass the node name into your Helm chart
            - name: "nodeName"
              value: '{{"{{name}}"}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: infoscale-vtas
      # Ensure the app is deleted if the node is removed from the ConfigMap
      syncPolicy:
        automated:
          enabled: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 10
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
{{- end }}
