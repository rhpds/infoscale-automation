{{- if .Values.infra.argoInfoscaleHealthCheck.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd33-infoscalecluster-healthcheck
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: argocd33-infoscalecluster-healthcheck
      containers:
      - name: argocd33-infoscalecluster-healthcheck
        image: bitnami/kubectl
        command:
        - /bin/sh
        - -c
        - |
          echo "######################"
          echo "# Patch the argocd instance to add InfoScaleCluster health check"
          echo "######################"

          add_healthcheck() {
            KIND=$1
            HC=$2

            EXISTING=$(kubectl get argocd openshift-gitops -n openshift-gitops \
              -o jsonpath="{.spec.resourceHealthChecks[?(@.kind==\"${KIND}\")].kind}")

            if [ "$EXISTING" = "$KIND" ]; then
              echo "$KIND health check already exists, skipping."
              return
            fi

            ARRAY_EXISTS=$(kubectl get argocd openshift-gitops -n openshift-gitops \
              -o jsonpath='{.spec.resourceHealthChecks}')

            if [ -z "$ARRAY_EXISTS" ]; then
              echo "resourceHealthChecks array does not exist, creating with $KIND."
              kubectl patch argocd openshift-gitops -n openshift-gitops --type=json \
                -p="[{\"op\":\"add\",\"path\":\"/spec/resourceHealthChecks\",\"value\":[${HC}]}]"
            else
              echo "Appending $KIND health check."
              kubectl patch argocd openshift-gitops -n openshift-gitops --type=json \
                -p="[{\"op\":\"add\",\"path\":\"/spec/resourceHealthChecks/-\",\"value\":${HC}}]"
            fi
          }

          echo "######################"
          echo "# LVMCluster health check"
          echo "######################"

          LVMS_HC='{"group":"lvm.topolvm.io","kind":"LVMCluster","check":"hs = {}\nif obj.status ~= nil and obj.status.conditions ~= nil then\n  for i, condition in pairs(obj.status.conditions) do\n    if condition.type == \"VolumeGroupsReady\" and condition.status == \"True\" then\n      hs.status = \"Healthy\"\n      hs.message = condition.message\n      return hs\n    end\n    if condition.type == \"VolumeGroupsReady\" and condition.status == \"False\" then\n      hs.status = \"Degraded\"\n      hs.message = condition.message\n      return hs\n    end\n  end\nend\nhs.status = \"Progressing\"\nhs.message = \"Waiting for LVMCluster volume groups\"\nreturn hs"}'

          add_healthcheck "LVMCluster" "$LVMS_HC"

          echo "######################"
          echo "# InfoScaleCluster health check"
          echo "######################"

          INFOSCALE_HC='{"group":"infoscale.veritas.com","kind":"InfoScaleCluster","check":"hs = {}\nif obj.status ~= nil and obj.status.clusterState ~= nil then\n  if obj.status.clusterState == \"Healthy\" then\n    hs.status = \"Healthy\"\n    hs.message = \"InfoScaleCluster is healthy\"\n  elseif obj.status.clusterState == \"Degraded\" or obj.status.clusterState == \"Failed\" then\n    hs.status = \"Degraded\"\n    hs.message = \"clusterState is \" .. obj.status.clusterState\n  else\n    hs.status = \"Progressing\"\n    hs.message = \"Waiting for clusterState to become Healthy, current: \" .. obj.status.clusterState\n  end\nelse\n  hs.status = \"Progressing\"\n  hs.message = \"Waiting for InfoScaleCluster status\"\nend\nreturn hs"}'

          add_healthcheck "InfoScaleCluster" "$INFOSCALE_HC"
{{- end -}}
