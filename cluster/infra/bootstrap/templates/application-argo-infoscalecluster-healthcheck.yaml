{{- if .Values.infra.argoInfoscaleHealthCheck.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd33-infoscalecluster-healthcheck
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd33-infoscalecluster-healthcheck
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: argocd33-infoscalecluster-healthcheck
      containers:
      - name: argocd33-infoscalecluster-healthcheck
        # image: image-registry.openshift-image-registry.svc:5000/openshift/cli
        image: bitnami/kubectl
        command:
        - /bin/sh
        - -c
        - |
          echo "######################"
          echo "# Patch the argocd instance to add InfoScaleCluster health check"
          echo "######################"

          EXISTING=$(kubectl get argocd openshift-gitops -n openshift-gitops \
            -o jsonpath='{.spec.resourceHealthChecks[?(@.kind=="InfoScaleCluster")].kind}')

          if [ "$EXISTING" = "InfoScaleCluster" ]; then
            echo "InfoScaleCluster health check already exists, skipping."
            exit 0
          fi

          kubectl patch argocd openshift-gitops -n openshift-gitops --type=json -p='[{"op":"add","path":"/spec/resourceHealthChecks/-","value":{"group":"infoscale.veritas.com","kind":"InfoScaleCluster","check":"hs = {}\nif obj.status ~= nil and obj.status.clusterState ~= nil then\n  if obj.status.clusterState == \"Healthy\" then\n    hs.status = \"Healthy\"\n    hs.message = \"InfoScaleCluster is healthy\"\n  elseif obj.status.clusterState == \"Degraded\" or obj.status.clusterState == \"Failed\" then\n    hs.status = \"Degraded\"\n    hs.message = \"clusterState is \" .. obj.status.clusterState\n  else\n    hs.status = \"Progressing\"\n    hs.message = \"Waiting for clusterState to become Healthy, current: \" .. obj.status.clusterState\n  end\nelse\n  hs.status = \"Progressing\"\n  hs.message = \"Waiting for InfoScaleCluster status\"\nend\nreturn hs"}}]'
{{- end -}}
